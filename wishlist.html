<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wishlist | Our Store</title>

  <!-- Protect page -->
  <script>
    if (!localStorage.getItem("loggedInUser")) {
      window.location.href = "login.html";
    }
  </script>

  <link rel="stylesheet" href="css/style.css">

  <!-- Font Awesome (IMPORTANT — fixes icon issue) -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <a href="index.html" style="color:white;text-decoration:none;">OurStore</a>
    </div>

    <h3>My Wishlist</h3>

    <div class="nav-links">
      <a href="index.html" class="back-shop-btn">
  Back to Shop
</a>



      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <h2 class="section-title">Saved Items</h2>

    <section class="product-grid" id="wishlistContainer">
    </section>
  </div>

  <script src="js/products.js"></script>

  <script>
    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }

    function loadWishlist() {
      const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      const container = document.getElementById("wishlistContainer");

      container.innerHTML = "";

      if (wishlist.length === 0) {
        container.innerHTML = "<p>No saved items yet.</p>";
        return;
      }

      const savedProducts = products.filter(p => wishlist.includes(p.id));

      savedProducts.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `
  <img src="${product.image}">
  <h3>${product.name}</h3>
  <p class="price">₹${product.price}</p>

  <button class="remove-btn" onclick="removeItem(${product.id})">
    Remove
  </button>
`;

        container.appendChild(card);
      });
    }

    loadWishlist();




function removeItem(id) {
  let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
  wishlist = wishlist.filter(item => item !== id);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  loadWishlist();
}




  </script>

</body>
</html>
