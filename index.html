<!-- MODERN AI CHATBOX -->
<div id="chatbox" class="chatbox">

  <div class="chat-header">
    🤖 AI Assistant
    <span id="closeChat">✖</span>
  </div>

  <div id="aiChat" class="chat-messages"></div>


  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Ask me anything...">
    <button id="voiceBtn">🎤</button>
    <button onclick="sendMessage()">➤</button>
  </div>

</div>





<script>
document.addEventListener("DOMContentLoaded", () => {

  const voiceBtn = document.getElementById("voiceBtn");

  voiceBtn.onclick = () => {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
      document.getElementById("chat-input").value = event.results[0][0].transcript;
    };
  };

});
</script>


<script>

function sendMessage() {
  const input = document.getElementById("chat-input");
  const msg = input.value.toLowerCase().trim();
  if (!msg) return;

  addChat("user", msg);

  let response = "Sorry, I didn't understand.";

  // NORMAL SEARCH
  let results = products.filter(p =>
    p.name.toLowerCase().includes(msg)
  );

  // SMART FILTERS
  if (msg.includes("cheap") || msg.includes("under")) {
    results = products.filter(p => p.price <= 2000);
  }

  if (msg.includes("expensive") || msg.includes("above")) {
    results = products.filter(p => p.price >= 3000);
  }

  if (msg.includes("gift")) {
    results = products.filter(p => p.price <= 2500);
  }

  // SHOW RESULTS
  if (results.length > 0) {
    response = "I found these products:<br>";

    results.forEach(p => {
      response += `• ${p.name} — ₹${p.price}<br>`;
    });

    
  }

  if (results.length > 0) {
  setTimeout(() => addChat("bot", response), 500);
} else {

  fetch("https://ai-server-ab9y.onrender.com/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: msg })
  })
  .then(res => res.json())
  .then(data => {
    addChat("bot", data.reply);
  })
  .catch(() => {
    addChat("bot", "Server error. Try again.");
  });

}

input.value = "";

}
function addChat(type, text) {
  const chat = document.getElementById("aiChat");
  const msg = document.createElement("div");
  msg.className = "chat-msg " + type;
  msg.innerHTML = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}






function scrollToProduct(productId) {
  const element = document.getElementById("product-" + productId);

  if (element) {
    element.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });

    element.style.border = "3px solid #28a745";

    setTimeout(() => {
      element.style.border = "";
    }, 2000);
  }
}





</script>




<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("chatbot-btn");

  const closeBtn = document.getElementById("closeChat");

  btn.addEventListener("click", () => {
    box.style.display = "flex";
  });

  closeBtn.addEventListener("click", () => {
    box.style.display = "none";

});
</script>
