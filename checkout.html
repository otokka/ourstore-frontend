<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Our Store</title>


<script>
  const user = localStorage.getItem("loggedInUser");

  if (!user) {
    window.location.href = "login.html";
  }
</script>




  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- AMAZON-STYLE NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <a href="index.html" style="color:white;text-decoration:none;">OurStore</a>
    </div>

    <div class="nav-links">

      <a href="index.html" class="back-shop-btn">
  Back to Shop
</a>



      <a href="cart.html">
        <i class="fas fa-shopping-cart"></i>
        (<span id="cart-count">0</span>)
      </a>
      <span style="margin-left:10px;">
        ₹<span id="cart-total">0</span>
      </span>
    </div>
  </header>

  <!-- MAIN -->
  <div class="checkout-wrapper">

  <div class="checkout-card">

    <!-- LOGO / TITLE -->
    <h1 class="store-logo">OurStore</h1>
    <p class="subtitle">Secure Checkout</p>

    <form id="checkout-form">

      <div class="input-group">
        <label>Name</label>
        <input type="text" id="name" required placeholder="Enter your name">
      </div>

      <div class="input-group">
        <label>Address</label>
        <textarea id="address" required placeholder="Enter delivery address"></textarea>
      </div>

      <div class="input-group">
        <label>Payment Method</label>
        <select id="payment">
          <option value="cod">Cash on Delivery</option>
          <option value="upi">UPI</option>
          <option value="card">Card</option>
        </select>
      </div>

      <button type="button" onclick="payNow()" class="checkout-btn">
  Place Order
</button>


    </form>

  </div>

</div>


  <!-- JS -->
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  


</body>
</html>
